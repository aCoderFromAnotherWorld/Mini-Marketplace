# Used during `mvn test` — swaps PostgreSQL for H2 in-memory
# so tests run without needing a running database container.
spring:
  datasource:
    url:                  jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name:    org.h2.Driver
    username:             sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  thymeleaf:
    cache: false
