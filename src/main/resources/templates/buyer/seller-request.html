<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Become a Seller - MiniMarket</title>
  <link rel="stylesheet" th:href="@{/css/base.css}"/>
  <link rel="stylesheet" th:href="@{/css/seller-request.css}"/>
</head>
<body class="auth-page seller-request-page">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="auth-main">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">Store</div>
      <h1>Become a Seller</h1>
      <p>Submit a quick request and the admin can review your seller upgrade.</p>
    </div>

    <div th:if="${successMsg}" class="alert alert-success"><span>OK</span><span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}" class="alert alert-error"><span>ERR</span><span th:text="${errorMsg}"></span></div>

    <form th:action="@{/buyer/seller-request}" method="post" class="auth-form">
      <div class="field">
        <label for="note">Why do you want to sell? (optional)</label>
        <textarea id="note" name="note" rows="4" class="auth-textarea"
                  placeholder="Tell us what you plan to sell..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Submit request</button>
    </form>

    <a th:href="@{/buyer/dashboard}" class="btn btn-outline btn-full auth-secondary-action">Back to buyer dashboard</a>
  </div>
</main>
</body>
</html>
