<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dashboard - Mini Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Mini Marketplace</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" sec:authentication="name"></span>
                <a class="nav-link" href="/logout">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2>Welcome to Dashboard, <span th:text="${username}"></span>!</h2>
        <div th:if="${isAdmin}" class="alert alert-info">
            Admin dashboard - Manage users/products.
        </div>
        <div th:if="${isSeller}" class="alert alert-success">
            Seller dashboard - Manage your products.
        </div>
        <div th:if="${isBuyer}" class="alert alert-primary">
            Buyer dashboard - Browse products and orders.
        </div>
        <div class="mt-4">
            <a href="/products" class="btn btn-primary">Browse Products</a>
            <a th:href="${isSeller} ? '/seller/products' : '/buyer/orders'" class="btn btn-secondary ms-2">My Items</a>
        </div>
    </div>
</body>
</html>
