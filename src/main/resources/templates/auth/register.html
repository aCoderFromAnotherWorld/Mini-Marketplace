<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up - MiniMarket</title>
  <style>
/* base.css */
/* MiniMarket base styles */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f5f7fb;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --primary: #4f46e5;
  --primary-hov: #4338ca;
  --primary-lt: #eef2ff;
  --success: #16a34a;
  --success-lt: #dcfce7;
  --error: #dc2626;
  --error-lt: #fee2e2;
  --info: #0369a1;
  --info-lt: #e0f2fe;
  --admin: #7c3aed;
  --admin-lt: #f5f3ff;
  --seller: #d97706;
  --seller-lt: #fffbeb;
  --buyer: #0891b2;
  --buyer-lt: #ecfeff;
  --guest: #64748b;
  --guest-lt: #f1f5f9;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-pill: 9999px;
  --shadow: 0 1px 3px rgba(0, 0, 0, 0.07), 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
  --font: "Inter", system-ui, -apple-system, sans-serif;
  --mono: "Fira Code", "Courier New", monospace;
}

html {
  scroll-behavior: smooth;
}

body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  line-height: 1.6;
}

img {
  display: block;
  max-width: 100%;
}

button,
input,
select,
textarea {
  font: inherit;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 1.5rem;
}

.muted {
  color: var(--muted);
}

.center {
  text-align: center;
}

.main {
  min-height: calc(100vh - 60px - 52px);
}

.page-shell {
  padding-top: 2rem;
  padding-bottom: 2.5rem;
}

.page-header {
  margin-bottom: 2rem;
}

.page-header h1 {
  margin: 0.5rem 0 0.3rem;
  font-size: 1.75rem;
  font-weight: 800;
}

.dash-section {
  margin-bottom: 2.5rem;
}

.dash-title {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.9rem;
  font-size: 1.05rem;
  font-weight: 700;
}

.count-badge {
  padding: 0.15rem 0.55rem;
  border-radius: var(--radius-pill);
  background: var(--primary-lt);
  color: var(--primary);
  font-size: 0.73rem;
  font-weight: 700;
}

.empty-box {
  padding: 1.4rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
  color: var(--muted);
  font-size: 0.9rem;
}

.info-box {
  margin-bottom: 1.5rem;
  padding: 1.4rem;
  border: 1.5px solid #c7d2fe;
  border-radius: var(--radius-md);
  background: var(--primary-lt);
  color: #3730a3;
  font-size: 0.9rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.5rem 1.1rem;
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  background: none;
  color: inherit;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 600;
  text-decoration: none;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}

.btn-primary {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.btn-primary:hover {
  border-color: var(--primary-hov);
  background: var(--primary-hov);
}

.btn-outline {
  border-color: var(--border);
  background: var(--surface);
  color: var(--muted);
}

.btn-outline:hover {
  border-color: #94a3b8;
  background: #f8fafc;
  color: var(--text);
}

.btn-ghost {
  border-color: transparent;
  background: none;
  color: var(--muted);
}

.btn-ghost:hover {
  background: #f1f5f9;
  color: var(--text);
}

.btn-white {
  border-color: #fff;
  background: #fff;
  color: var(--primary);
}

.btn-white:hover {
  background: #eef2ff;
}

.btn-lg {
  padding: 0.65rem 1.5rem;
  border-radius: var(--radius-md);
  font-size: 1rem;
}

.btn-sm {
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem;
}

.btn-full {
  width: 100%;
}

.btn-approve {
  border-color: #86efac;
  background: var(--success-lt);
  color: var(--success);
}

.btn-approve:hover {
  background: #bbf7d0;
}

.btn-reject {
  border-color: #fca5a5;
  background: var(--error-lt);
  color: var(--error);
}

.btn-reject:hover {
  background: #fecaca;
}

.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1.5px solid var(--border);
  background: var(--surface);
  box-shadow: var(--shadow);
}

.nav-inner {
  display: flex;
  align-items: center;
  gap: 1rem;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0.7rem 1.5rem;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
  text-decoration: none;
}

.logo-mark {
  font-size: 1.35rem;
}

.logo-name {
  color: var(--primary);
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: -0.3px;
}

.nav-search {
  display: flex;
  flex: 1;
  gap: 0.5rem;
  max-width: 480px;
  margin: 0 auto;
}

.search-input {
  flex: 1;
  padding: 0.42rem 0.85rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-size: 0.875rem;
  transition: border-color 0.15s;
}

.search-input:focus {
  outline: none;
  border-color: var(--primary);
  background: var(--surface);
}

.search-btn {
  padding: 0.42rem 1rem;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--primary);
  color: #fff;
  cursor: pointer;
  font-size: 0.875rem;
  font-weight: 600;
  transition: background 0.15s;
}

.search-btn:hover {
  background: var(--primary-hov);
}

.nav-right,
.nav-guest,
.nav-user {
  display: flex;
  align-items: center;
}

.nav-right {
  gap: 0.5rem;
  flex-shrink: 0;
}

.nav-guest {
  gap: 0.5rem;
}

.nav-user {
  gap: 0.6rem;
}

.nav-username {
  font-size: 0.875rem;
  font-weight: 600;
}

.nav-logout-form {
  margin: 0;
}

.role-pill,
.mode-pill {
  display: inline-block;
  border-radius: var(--radius-pill);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.role-pill {
  padding: 0.18rem 0.6rem;
}

.mode-pill {
  padding: 0.3rem 1rem;
  border: 1.5px solid transparent;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
}

.pill-admin {
  background: var(--admin-lt);
  color: var(--admin);
}

.pill-seller {
  background: var(--seller-lt);
  color: var(--seller);
}

.pill-buyer {
  background: var(--buyer-lt);
  color: var(--buyer);
}

.pill-guest {
  background: var(--guest-lt);
  color: var(--guest);
}

.mode-pill.pill-guest {
  border-color: #cbd5e1;
}

.mode-pill.pill-admin {
  border-color: #c4b5fd;
}

.mode-pill.pill-seller {
  border-color: #fcd34d;
}

.mode-pill.pill-buyer {
  border-color: #a5f3fc;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.field label {
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 600;
}

.field input,
.field textarea,
.field select {
  padding: 0.58rem 0.9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-size: 0.9rem;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.field input:focus,
.field textarea:focus,
.field select:focus {
  outline: none;
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
}

.field-error label {
  color: var(--error);
}

.field-error input {
  border-color: var(--error);
}

.err-msg {
  color: var(--error);
  font-size: 0.8rem;
}

.alert {
  display: flex;
  align-items: flex-start;
  gap: 0.55rem;
  margin-bottom: 1rem;
  padding: 0.7rem 0.9rem;
  border: 1.5px solid transparent;
  border-radius: var(--radius-sm);
  font-size: 0.875rem;
}

.alert-error {
  border-color: #fca5a5;
  background: var(--error-lt);
  color: #991b1b;
}

.alert-success {
  border-color: #86efac;
  background: var(--success-lt);
  color: #166534;
}

.alert-info {
  border-color: #7dd3fc;
  background: var(--info-lt);
  color: #075985;
}

.table-box {
  overflow-x: auto;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--surface);
}

.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}

.tbl th {
  padding: 0.65rem 1rem;
  border-bottom: 1.5px solid var(--border);
  background: #f8fafc;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 600;
  text-align: left;
  white-space: nowrap;
}

.tbl td {
  padding: 0.6rem 1rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.tbl tr:last-child td {
  border-bottom: none;
}

.tbl tr:hover td {
  background: #f8fafc;
}

.action-row {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.status-on,
.status-off {
  font-size: 0.8rem;
  font-weight: 600;
}

.status-on {
  color: var(--success);
}

.status-off {
  color: var(--error);
}

@media (max-width: 768px) {
  .nav-search {
    display: none;
  }

  .nav-inner {
    flex-wrap: wrap;
  }
}

/* auth-common.css */
.auth-page {
  background: linear-gradient(135deg, #eef2ff 0%, #faf5ff 100%);
}

.auth-main {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: calc(100vh - 60px);
  padding: 3rem 1rem;
}

.auth-card {
  width: 100%;
  max-width: 420px;
  padding: 2.25rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow-lg);
}

.auth-header {
  margin-bottom: 1.75rem;
  text-align: center;
}

.auth-icon {
  display: block;
  margin-bottom: 0.5rem;
  font-size: 2.4rem;
}

.auth-header h1 {
  margin-bottom: 0.3rem;
  font-size: 1.45rem;
  font-weight: 800;
}

.auth-header p {
  color: var(--muted);
  font-size: 0.9rem;
}

.auth-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  margin-bottom: 1.2rem;
}

.auth-switch {
  margin-top: 0.5rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.875rem;
}

.auth-switch a {
  color: var(--primary);
  font-weight: 600;
  text-decoration: none;
}

.auth-switch a:hover {
  text-decoration: underline;
}

.auth-textarea {
  resize: vertical;
  min-height: 112px;
}

.auth-secondary-action {
  margin-top: 0.75rem;
}

.demo-hint {
  margin-top: 1.2rem;
  padding: 0.7rem;
  border: 1.5px solid #fde68a;
  border-radius: var(--radius-sm);
  background: #fffbeb;
  color: #92400e;
  text-align: center;
  font-size: 0.8rem;
}

.demo-hint code {
  padding: 0.1rem 0.3rem;
  border-radius: 3px;
  background: rgba(0, 0, 0, 0.06);
  font-family: var(--mono);
}

@media (max-width: 480px) {
  .auth-card {
    padding: 1.75rem 1.2rem;
  }
}

/* register.css */
.register-page .auth-card {
  max-width: 440px;
}

.register-page .auth-icon {
  color: var(--success);
}
  </style>
</head>
<body class="auth-page register-page">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="auth-main">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">âš¡</div>
      <h1>Create account</h1>
      <p>All new accounts start as buyers</p>
    </div>

    <div th:if="${errorMsg}" class="alert alert-error">
      <span>âœ•</span><span th:text="${errorMsg}"></span>
    </div>

    <form th:action="@{/auth/register}"
          th:object="${registerRequest}"
          method="post" class="auth-form">
      <!-- Username -->
      <div class="field" th:classappend="${#fields.hasErrors('username')} ? 'field-error' : ''">
        <label for="reg-username">Username</label>
        <input id="reg-username" type="text" th:field="*{username}"
               placeholder="3â€“20 chars, letters/numbers/underscores"
               autocomplete="username" autofocus/>
        <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="err-msg"></span>
      </div>

      <!-- Email -->
      <div class="field" th:classappend="${#fields.hasErrors('email')} ? 'field-error' : ''">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" th:field="*{email}"
               placeholder="you@example.com" autocomplete="email"/>
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="err-msg"></span>
      </div>

      <!-- Password -->
      <div class="field" th:classappend="${#fields.hasErrors('password')} ? 'field-error' : ''">
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" th:field="*{password}"
               placeholder="At least 6 characters" autocomplete="new-password"/>
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="err-msg"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a th:href="@{/auth/login}">Log in</a></p>

  </div>
</main>
</body>
</html>
