<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error - MiniMarket</title>
  <link rel="stylesheet" th:href="@{/css/base.css}"/>
  <link rel="stylesheet" th:href="@{/css/error.css}"/>
</head>
<body class="auth-page error-page">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>
<main class="auth-main">
  <div class="auth-card error-card">
    <div class="error-code"
         th:text="${errorCode != null ? errorCode : (status != null ? status : '500')}">500</div>
    <h1 class="error-title"
        th:text="${errorTitle != null ? errorTitle : (error != null ? error : 'Something went wrong')}">Something went wrong</h1>
    <p class="muted"
       th:text="${errorMessage != null ? errorMessage : (message != null ? message : 'An unexpected error occurred.')}">
      An unexpected error occurred.
    </p>
    <div class="error-summary">
      <div class="error-meta-grid">
        <div>
          <div class="error-meta-label">Path</div>
          <div class="error-mono"
               th:text="${requestPath != null ? requestPath : (path != null ? path : 'Unknown')}">/unknown</div>
        </div>
        <div>
          <div class="error-meta-label">Problem</div>
          <div class="error-mono"
               th:text="${errorType != null ? errorType : (exception != null ? exception : 'UnknownException')}">UnknownException</div>
        </div>
      </div>
    </div>
    <details th:if="${trace != null}" class="error-details">
      <summary>Stack trace</summary>
      <pre class="error-trace"
           th:text="${trace}"></pre>
    </details>
    <div class="error-actions">
      <a th:href="@{/}" class="btn btn-primary">Go to Start</a>
    </div>
  </div>
</main>
</body>
</html>
