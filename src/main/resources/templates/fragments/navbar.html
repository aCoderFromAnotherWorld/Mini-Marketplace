<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
<nav th:fragment="navbar" class="navbar">
  <div class="nav-inner">
    <a th:href="@{/}" class="nav-logo">
      <span class="logo-mark">MM</span>
      <span class="logo-name">MiniMarket</span>
    </a>

    <form class="nav-search" th:action="@{/search}" method="get">
      <input type="text" name="q" class="search-input"
             placeholder="Search digital products..."
             th:value="${searchQuery}"/>
      <button type="submit" class="search-btn">Search</button>
    </form>

    <div class="nav-right">
      <div sec:authorize="!isAuthenticated()" class="nav-guest">
        <a th:href="@{/auth/login}" class="btn btn-ghost btn-sm">Log in</a>
        <a th:href="@{/auth/register}" class="btn btn-primary btn-sm">Sign up</a>
      </div>

      <div sec:authorize="isAuthenticated()" class="nav-user">
        <span sec:authorize="hasRole('ADMIN')" class="role-pill pill-admin">ADMIN</span>
        <span sec:authorize="hasRole('SELLER') and !hasRole('ADMIN')" class="role-pill pill-seller">SELLER</span>
        <span sec:authorize="hasRole('BUYER') and !hasRole('SELLER') and !hasRole('ADMIN')" class="role-pill pill-buyer">BUYER</span>

        <span class="nav-username" sec:authentication="name">user</span>

        <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')" class="btn btn-ghost btn-sm">Dashboard</a>
        <a th:href="@{/seller/dashboard}" sec:authorize="hasRole('SELLER') and !hasRole('ADMIN')" class="btn btn-ghost btn-sm">Dashboard</a>
        <a th:href="@{/buyer/dashboard}" sec:authorize="hasRole('BUYER') and !hasRole('SELLER') and !hasRole('ADMIN')" class="btn btn-ghost btn-sm">Dashboard</a>
        <a th:href="@{/buyer/orders}" sec:authorize="hasRole('BUYER') and !hasRole('SELLER') and !hasRole('ADMIN')" class="btn btn-ghost btn-sm">My Orders</a>

        <form th:action="@{/auth/logout}" method="post" class="nav-logout-form">
          <button type="submit" class="btn btn-ghost btn-sm">Log out</button>
        </form>
      </div>
    </div>
  </div>
</nav>
</body>
</html>
