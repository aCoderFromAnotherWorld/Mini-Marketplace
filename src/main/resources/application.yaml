spring:
  application:
    name: minimarketplace

  # Local profile (default)
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/minimarketplace
    username: minimarket
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    user:
      name: admin
      password: admin  # temp, remove later

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://db:5432/minimarketplace
    username: minimarket
    password: secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    com.example.minimarketplace: DEBUG
