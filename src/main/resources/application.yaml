spring:
  application:
    name: minimarketplace

  # ── Database ──────────────────────────────────────────────────────
  # spring-boot-docker-compose auto-fills these locally from compose.yaml.
  # On Render / production, set SPRING_DATASOURCE_* env vars instead.
  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${DB_PORT:5433}/minimarket}
    username: ${SPRING_DATASOURCE_USERNAME:appuser}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ───────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}   # update = dev, validate = prod
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Thymeleaf ─────────────────────────────────────────────────────
  thymeleaf:
    cache: false

# ── Server ────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  error:
    include-message: ${SERVER_ERROR_INCLUDE_MESSAGE:always}
    include-binding-errors: ${SERVER_ERROR_INCLUDE_BINDING_ERRORS:always}
    include-exception: ${SERVER_ERROR_INCLUDE_EXCEPTION:true}
    include-stacktrace: ${SERVER_ERROR_INCLUDE_STACKTRACE:on_param}

# ── Logging ───────────────────────────────────────────────────────
logging:
  level:
    org.springframework.security: DEBUG
    com.example.minimarketplace: DEBUG
