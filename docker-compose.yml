# version removed (obsolete)
services:
  postgres:
    image: postgres:16
    container_name: minimarketplace_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-minimarketplace}
      POSTGRES_USER: ${DB_USER:-minimarket}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Optional init later

  app:
    build: .
    container_name: minimarketplace_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-minimarketplace}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-minimarket}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secret}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      retries: 3

volumes:
  postgres_data:
